<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbuns · @eusouleandroribeiro</title>
<meta name="description" content="Álbuns do evento por @eusouleandroribeiro">
<meta property="og:type" content="website">
<meta property="og:site_name" content="@eusouleandroribeiro">
<meta property="og:title" id="og-title" content="Álbuns · @eusouleandroribeiro">
<meta property="og:description" content="Veja os álbuns do evento">
<meta property="og:image" id="og-image" content="">
<meta property="og:url" id="og-url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="tw-title" content="Álbuns · @eusouleandroribeiro">
<meta name="twitter:image" id="tw-image" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:#0d0d0d; color:#f0ece6; -webkit-font-smoothing:antialiased; }

  .hero { position:relative; min-height:52vh; display:flex; align-items:flex-end;
          background:#111 center/cover no-repeat; }
  .hero::after { content:''; position:absolute; inset:0;
                 background:linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.25)); }
  .hero-inner { position:relative; z-index:1; padding:34px 26px; width:100%; max-width:1240px; margin:0 auto; }
  .hero-kicker { font-family:'Barlow',sans-serif; font-size:.72rem; letter-spacing:.22em;
                 text-transform:lowercase; color:#bdbdbd; text-decoration:none; }
  .hero-kicker:hover { color:#FF6A00; }
  .hero-title { font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase;
                font-size:clamp(1.9rem,5.5vw,3.6rem); line-height:1; letter-spacing:.01em;
                margin-top:8px; color:#fff; text-shadow:0 2px 24px rgba(0,0,0,.4); }

  .wrap { max-width:1240px; margin:0 auto; padding:30px 20px 20px; }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); }

  .album { display:block; text-decoration:none; color:inherit; background:#141414;
           border:1px solid #232323; border-radius:12px; overflow:hidden;
           transition:transform .18s ease, border-color .18s ease; }
  .album:hover { transform:translateY(-4px); border-color:#FF6A00; }
  .album-cover { aspect-ratio:4/3; background:#1b1b1b; overflow:hidden; }
  .album-cover img { width:100%; height:100%; object-fit:cover; display:block;
                     opacity:0; transition:opacity .4s, transform .5s; }
  .album-cover img.loaded { opacity:1; }
  .album:hover .album-cover img.loaded { transform:scale(1.05); }
  .album-body { padding:13px 14px 15px; }
  .album-row { display:flex; flex-direction:column; gap:3px; }
  .album-name { font-family:'Oswald',sans-serif; font-weight:600; text-transform:uppercase;
                letter-spacing:.02em; font-size:.98rem; color:#fff; line-height:1.15;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .album-date { font-family:'Barlow',sans-serif; font-size:.49rem; color:#8a8a8a;
                text-align:right; letter-spacing:.03em; }
  .album-meta { font-size:.72rem; color:#8a8a8a; margin-top:5px; }

  .empty,.loading { text-align:center; color:#8a8a8a; padding:60px 20px; font-size:.85rem; }

  .brand { text-align:center; padding:40px 22px 46px; font-size:.74rem; color:#8a8a8a; line-height:1.9;
           border-top:1px solid #1c1c1c; margin-top:24px; }
  .brand .cred-link { color:#bdbdbd; text-decoration:none; }
  .brand .cred-link:hover { color:#FF6A00; }
  .brand a.another, .brand .another { font-family:Georgia,'Times New Roman',serif; color:#fff; font-weight:700; font-size:1rem; text-decoration:none; }
  .brand a.another:hover { color:#FF6A00; }
  .brand .another .dot { color:#e5352b; }
</style>
</head>
<body>
  <div class="hero" id="hero"><div class="hero-inner">
    <a class="hero-kicker" href="https://instagram.com/eusouleandroribeiro" target="_blank" rel="noopener">@eusouleandroribeiro</a>
    <h1 class="hero-title" id="grp-title">Álbuns</h1>
  </div></div>
  <div class="wrap">
    <div id="grid" class="grid"></div>
    <div id="loading" class="loading">Carregando álbuns…</div>
    <div id="empty" class="empty" style="display:none">Nenhum álbum disponível ainda.</div>
  </div>
  <div class="brand">
    <a class="cred-link" href="https://instagram.com/eusouleandroribeiro" target="_blank" rel="noopener">Fotografia por @eusouleandroribeiro</a><br>
    Produzido por <a class="another" href="https://www.another.com.br" target="_blank" rel="noopener">another<span class="dot">.</span></a><br>
    Direção criativa de Leandro Ribeiro.
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
const sb = getSupabase();
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function init(){
  const token = new URLSearchParams(location.search).get('t');
  const loading = document.getElementById('loading');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(!token){ loading.textContent = 'Link inválido.'; return; }

  const { data, error } = await sb.rpc('get_public_group', { p_token: token });
  if(error || !data || data.error){ loading.textContent = 'Álbum não encontrado ou indisponível.'; return; }

  const name = data.name || 'Álbuns';
  document.title = `${name} · @eusouleandroribeiro`;
  document.getElementById('grp-title').textContent = name;
  document.getElementById('og-title').content = `${name} · @eusouleandroribeiro`;
  document.getElementById('tw-title').content = `${name} · @eusouleandroribeiro`;
  document.getElementById('og-url').content = location.href;
  if(data.cover){
    document.getElementById('hero').style.backgroundImage = `url("${data.cover}")`;
    document.getElementById('og-image').content = data.cover;
    document.getElementById('tw-image').content = data.cover;
  }

  const kids = Array.isArray(data.galleries) ? data.galleries : [];
  loading.style.display = 'none';
  if(kids.length === 0){ empty.style.display = 'block'; return; }

  kids.forEach(g => {
    const a = document.createElement('a');
    a.className = 'album';
    a.href = `gallery.html?t=${g.token}`;
    a.innerHTML = `
      <div class="album-cover">
        ${g.cover ? `<img src="${g.cover}" alt="${esc(g.name)}" loading="lazy" onload="this.classList.add('loaded')">` : ''}
      </div>
      <div class="album-body">
        <div class="album-row">
          <span class="album-name">${esc(g.name)}</span>
          <span class="album-date">${esc(g.date||'')}</span>
        </div>
        <div class="album-meta">${g.count||0} fotos</div>
      </div>`;
    grid.appendChild(a);
  });
}
init();
</script>
</body>
</html>
