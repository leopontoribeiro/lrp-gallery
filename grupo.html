<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbuns · @eusouleandroribeiro</title>
<meta name="description" content="Álbuns do evento por @eusouleandroribeiro">
<meta property="og:type" content="website">
<meta property="og:site_name" content="@eusouleandroribeiro">
<meta property="og:title" id="og-title" content="Álbuns · @eusouleandroribeiro">
<meta property="og:description" content="Veja os álbuns do evento">
<meta property="og:image" id="og-image" content="">
<meta property="og:url" id="og-url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="tw-title" content="Álbuns · @eusouleandroribeiro">
<meta name="twitter:image" id="tw-image" content="">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:#f3f2ef; color:#111; -webkit-font-smoothing:antialiased; }
  .hero { position:relative; height:46vh; min-height:280px; display:flex; align-items:flex-end;
          background:#ddd center/cover no-repeat; }
  .hero::after { content:''; position:absolute; inset:0;
                 background:linear-gradient(to top, rgba(0,0,0,.6), rgba(0,0,0,.05)); }
  .hero-inner { position:relative; z-index:1; padding:28px 22px; color:#fff; width:100%; }
  .hero-kicker { font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; opacity:.85; }
  .hero-title { font-size:clamp(1.6rem,6vw,3rem); font-weight:800; line-height:1.05; margin-top:6px;
                text-transform:uppercase; text-shadow:0 2px 18px rgba(0,0,0,.35); }
  .wrap { max-width:1200px; margin:0 auto; padding:26px 18px 60px; }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
  .album { display:block; text-decoration:none; color:inherit; border-radius:14px; overflow:hidden;
           background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.08); transition:transform .15s, box-shadow .15s; }
  .album:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
  .album-cover { aspect-ratio:4/3; background:#e7e6e3; overflow:hidden; }
  .album-cover img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .4s,transform .5s; }
  .album-cover img.loaded { opacity:1; }
  .album-body { padding:12px 14px; }
  .album-name { font-weight:700; font-size:.95rem; }
  .album-meta { font-size:.72rem; color:#777; margin-top:3px; }
  .empty,.loading { text-align:center; color:#888; padding:60px 20px; font-size:.85rem; }
  .brand { text-align:center; padding:22px; font-size:.72rem; color:#999; }
</style>
</head>
<body>
  <div class="hero" id="hero"><div class="hero-inner">
    <div class="hero-kicker">@eusouleandroribeiro</div>
    <h1 class="hero-title" id="grp-title">Álbuns</h1>
  </div></div>
  <div class="wrap">
    <div id="grid" class="grid"></div>
    <div id="loading" class="loading">Carregando álbuns…</div>
    <div id="empty" class="empty" style="display:none">Nenhum álbum disponível ainda.</div>
  </div>
  <div class="brand">© <span id="yr"></span> Souleandro Ribeiro</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const sb = getSupabase();
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function init(){
  const token = new URLSearchParams(location.search).get('t');
  const loading = document.getElementById('loading');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(!token){ loading.textContent = 'Link inválido.'; return; }

  const { data, error } = await sb.rpc('get_public_group', { p_token: token });
  if(error || !data || data.error){ loading.textContent = 'Álbum não encontrado ou indisponível.'; return; }

  const name = data.name || 'Álbuns';
  document.title = `${name} · @eusouleandroribeiro`;
  document.getElementById('grp-title').textContent = name;
  document.getElementById('og-title').content = `${name} · @eusouleandroribeiro`;
  document.getElementById('tw-title').content = `${name} · @eusouleandroribeiro`;
  document.getElementById('og-url').content = location.href;
  if(data.cover){
    document.getElementById('hero').style.backgroundImage = `url("${data.cover}")`;
    document.getElementById('og-image').content = data.cover;
    document.getElementById('tw-image').content = data.cover;
  }

  const kids = Array.isArray(data.galleries) ? data.galleries : [];
  loading.style.display = 'none';
  if(kids.length === 0){ empty.style.display = 'block'; return; }

  kids.forEach(g => {
    const a = document.createElement('a');
    a.className = 'album';
    a.href = `gallery.html?t=${g.token}`;
    a.innerHTML = `
      <div class="album-cover">
        ${g.cover ? `<img src="${g.cover}" alt="${esc(g.name)}" loading="lazy" onload="this.classList.add('loaded')">` : ''}
      </div>
      <div class="album-body">
        <div class="album-name">${esc(g.name)}</div>
        <div class="album-meta">${g.count||0} fotos</div>
      </div>`;
    grid.appendChild(a);
  });
}
init();
</script>
</body>
</html>
