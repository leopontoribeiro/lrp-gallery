<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main Background -->
  <rect width="1080" height="1920" fill="url(#bgGradient)"/>

  <!-- Main Container -->
  <rect x="60" y="80" width="960" height="1760" rx="40" fill="white" filter="url(#shadow)"/>

  <!-- Header Section -->
  <rect x="60" y="80" width="960" height="200" rx="40" fill="url(#headerGradient)"/>

  <!-- Header Title -->
  <text x="540" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    📱 Como Usar
  </text>
  <text x="540" y="210" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">
    Guia Completo do App
  </text>

  <!-- Left Column - Phone Mockup -->
  <g>
    <!-- Phone Body -->
    <rect x="100" y="320" width="380" height="1440" rx="60" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="2"/>

    <!-- Phone Screen -->
    <rect x="120" y="340" width="340" height="1400" rx="50" fill="#f5f5f5"/>

    <!-- Notch -->
    <rect x="220" y="340" width="140" height="35" rx="20" fill="#1a1a1a"/>

    <!-- Status Bar -->
    <rect x="120" y="340" width="340" height="40" fill="#333333"/>
    <text x="145" y="370" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">9:41</text>
    <text x="435" y="370" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="end">●●●●●</text>

    <!-- App Header -->
    <rect x="120" y="380" width="340" height="60" fill="url(#headerGradient)"/>
    <text x="290" y="420" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Galeria de Fotos</text>

    <!-- Tabs -->
    <rect x="120" y="440" width="340" height="50" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="120" y1="490" x2="460" y2="490" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Tab Buttons -->
    <text x="175" y="475" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#667eea" text-anchor="middle">Todas</text>
    <line x1="165" y1="485" x2="205" y2="485" stroke="#667eea" stroke-width="3"/>

    <text x="290" y="475" font-family="Arial, sans-serif" font-size="18" fill="#999999" text-anchor="middle">Favoritas</text>
    <text x="405" y="475" font-family="Arial, sans-serif" font-size="18" fill="#999999" text-anchor="middle">Rosto</text>

    <!-- Search Bar -->
    <rect x="135" y="510" width="310" height="45" rx="22" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="160" y="542" font-family="Arial, sans-serif" font-size="16" fill="#999999">🔍 Buscar por rosto...</text>

    <!-- Color Picker -->
    <circle cx="175" cy="590" r="15" fill="#667eea" stroke="#333" stroke-width="2"/>
    <circle cx="225" cy="590" r="15" fill="#764ba2"/>
    <circle cx="275" cy="590" r="15" fill="#ff6b6b"/>
    <circle cx="325" cy="590" r="15" fill="#ffa502"/>
    <circle cx="375" cy="590" r="15" fill="#26de81"/>

    <!-- Gallery Grid -->
    <g id="gallery">
      <!-- Row 1 -->
      <rect x="135" y="630" width="145" height="145" rx="12" fill="url(#headerGradient)"/>
      <circle cx="260" cy="655" r="18" fill="white" stroke="none"/>
      <text x="265" y="660" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">❤️</text>
      <text x="207" y="710" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">Foto 1</text>

      <rect x="295" y="630" width="145" height="145" rx="12" fill="url(#headerGradient)"/>
      <circle cx="405" cy="655" r="18" fill="white" stroke="none"/>
      <text x="410" y="660" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">🤍</text>
      <text x="367" y="710" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">Foto 2</text>

      <!-- Row 2 -->
      <rect x="135" y="795" width="145" height="145" rx="12" fill="url(#headerGradient)"/>
      <circle cx="260" cy="820" r="18" fill="white" stroke="none"/>
      <text x="265" y="825" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">❤️</text>
      <text x="207" y="875" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">Foto 3</text>

      <rect x="295" y="795" width="145" height="145" rx="12" fill="url(#headerGradient)"/>
      <circle cx="405" cy="820" r="18" fill="white" stroke="none"/>
      <text x="410" y="825" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">🤍</text>
      <text x="367" y="875" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7">Foto 4</text>
    </g>

    <!-- Bottom Navigation -->
    <rect x="120" y="1260" width="340" height="80" fill="white" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Nav Icons -->
    <text x="165" y="1290" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">📷</text>
    <text x="165" y="1318" font-family="Arial, sans-serif" font-size="12" fill="#667eea" text-anchor="middle" font-weight="600">Galeria</text>

    <text x="290" y="1290" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">❤️</text>
    <text x="290" y="1318" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Favoritas</text>

    <text x="415" y="1290" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">🔍</text>
    <text x="415" y="1318" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Rosto</text>
  </g>

  <!-- Right Column - Features -->
  <g id="features">
    <!-- Feature 1: Favoritar Fotos -->
    <rect x="520" y="320" width="460" height="280" rx="16" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="520" y="320" width="8" height="280" rx="16" fill="#667eea"/>

    <rect x="540" y="340" width="48" height="48" rx="8" fill="#667eea"/>
    <text x="564" y="375" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">❤️</text>

    <text x="610" y="375" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">Favoritar Fotos</text>

    <text x="540" y="410" font-family="Arial, sans-serif" font-size="16" fill="#666" line-height="24">
      <tspan x="540" dy="0">Toque no ícone de coração para marcar</tspan>
      <tspan x="540" dy="22">suas fotos favoritas. As fotos marcadas</tspan>
      <tspan x="540" dy="22">ficarão salvas na aba "Favoritas".</tspan>
    </text>

    <text x="540" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea">Como fazer:</text>
    <text x="560" y="495" font-family="Arial, sans-serif" font-size="14" fill="#555">1. Toque no coração branco (🤍) da foto</text>
    <text x="560" y="520" font-family="Arial, sans-serif" font-size="14" fill="#555">2. Ele ficará vermelho (❤️) indicando sucesso</text>
    <text x="560" y="545" font-family="Arial, sans-serif" font-size="14" fill="#555">3. Acesse "Favoritas" para ver a coleção</text>

    <!-- Feature 2: Buscar por Rosto -->
    <rect x="520" y="620" width="460" height="280" rx="16" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="520" y="620" width="8" height="280" rx="16" fill="#667eea"/>

    <rect x="540" y="640" width="48" height="48" rx="8" fill="#667eea"/>
    <text x="564" y="675" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🔍</text>

    <text x="610" y="675" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">Buscar por Rosto</text>

    <text x="540" y="710" font-family="Arial, sans-serif" font-size="16" fill="#666" line-height="24">
      <tspan x="540" dy="0">Use o reconhecimento facial para encontrar</tspan>
      <tspan x="540" dy="22">fotos de uma pessoa específica. Basta tirar</tspan>
      <tspan x="540" dy="22">uma selfie ou enviar uma foto.</tspan>
    </text>

    <text x="540" y="770" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea">Como fazer:</text>
    <text x="560" y="795" font-family="Arial, sans-serif" font-size="14" fill="#555">1. Acesse a aba "Rosto"</text>
    <text x="560" y="820" font-family="Arial, sans-serif" font-size="14" fill="#555">2. Tire uma selfie ou envie uma foto</text>
    <text x="560" y="845" font-family="Arial, sans-serif" font-size="14" fill="#555">3. O app procurará todas as fotos com esse rosto</text>

    <!-- Feature 3: Mudar Cores -->
    <rect x="520" y="920" width="460" height="280" rx="16" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="520" y="920" width="8" height="280" rx="16" fill="#667eea"/>

    <rect x="540" y="940" width="48" height="48" rx="8" fill="#667eea"/>
    <text x="564" y="975" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">🎨</text>

    <text x="610" y="975" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">Mudar Cores e Temas</text>

    <text x="540" y="1010" font-family="Arial, sans-serif" font-size="16" fill="#666" line-height="24">
      <tspan x="540" dy="0">Personalize a aparência do app escolhendo</tspan>
      <tspan x="540" dy="22">diferentes cores e temas visuais. Expresse</tspan>
      <tspan x="540" dy="22">seu estilo pessoal!</tspan>
    </text>

    <text x="540" y="1070" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea">Como fazer:</text>
    <text x="560" y="1095" font-family="Arial, sans-serif" font-size="14" fill="#555">1. Toque nos círculos de cor (parte superior)</text>
    <text x="560" y="1120" font-family="Arial, sans-serif" font-size="14" fill="#555">2. Escolha sua cor favorita</text>
    <text x="560" y="1145" font-family="Arial, sans-serif" font-size="14" fill="#555">3. Ou acesse "⚙️ Temas" para mais opções</text>

    <!-- Feature 4: Abas de Navegação -->
    <rect x="520" y="1220" width="460" height="280" rx="16" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="520" y="1220" width="8" height="280" rx="16" fill="#667eea"/>

    <rect x="540" y="1240" width="48" height="48" rx="8" fill="#667eea"/>
    <text x="564" y="1275" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle">📂</text>

    <text x="610" y="1275" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">Abas de Navegação</text>

    <text x="540" y="1310" font-family="Arial, sans-serif" font-size="16" fill="#666" line-height="24">
      <tspan x="540" dy="0">Use as abas no topo para filtrar e organizar</tspan>
      <tspan x="540" dy="22">suas fotos por categoria. Navegação rápida</tspan>
      <tspan x="540" dy="22">e fácil para encontrar o que procura.</tspan>
    </text>

    <text x="540" y="1370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea">Abas disponíveis:</text>
    <text x="560" y="1395" font-family="Arial, sans-serif" font-size="14" fill="#555"><tspan font-weight="600">Todas:</tspan> Veja todas as fotos do álbum</text>
    <text x="560" y="1420" font-family="Arial, sans-serif" font-size="14" fill="#555"><tspan font-weight="600">Favoritas:</tspan> Acesse suas fotos favoritadas</text>
    <text x="560" y="1445" font-family="Arial, sans-serif" font-size="14" fill="#555"><tspan font-weight="600">Rosto:</tspan> Busque por reconhecimento facial</text>
  </g>

  <!-- Bottom CTA Section -->
  <rect x="60" y="1540" width="960" height="300" rx="20" fill="#f0f0f0"/>

  <text x="540" y="1600" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#333" text-anchor="middle">Pronto para começar?</text>

  <text x="540" y="1650" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle" line-height="28">
    <tspan x="540" dy="0">Explore todas as funcionalidades e descubra como</tspan>
    <tspan x="540" dy="28">organizar, favoritar e buscar suas fotos favoritas</tspan>
    <tspan x="540" dy="28">com facilidade usando o reconhecimento facial!</tspan>
  </text>

  <!-- Button -->
  <rect x="340" y="1750" width="400" height="70" rx="35" fill="url(#headerGradient)"/>
  <text x="540" y="1805" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Explorar Galeria 📸</text>
</svg>
