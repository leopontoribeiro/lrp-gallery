<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LRP Gallery - Login Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=DM+Mono:wght@300;400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --panel: #141414;
      --border: #252525;
      --text: #f0ece6;
      --muted: #666;
      --accent: #e8ff47;
      --mono: 'DM Mono', monospace;
      --display: 'Big Shoulders Display', sans-serif;
      --body: 'Barlow', sans-serif;
      --error: #ff4f4f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
    }

    .logo {
      font-family: var(--display);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.05);
    }

    .error-message {
      background: rgba(255, 79, 79, 0.1);
      border: 1px solid rgba(255, 79, 79, 0.3);
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 20px;
      color: var(--error);
      font-size: 0.85rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: #f5ff7a;
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .forgot-password {
      margin-top: 20px;
      text-align: center;
    }

    .forgot-password a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .mfa-section {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .mfa-section.active {
      display: block;
    }

    @media (max-width: 600px) {
      .login-card { padding: 30px 20px; }
      .logo { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo">LRP</div>
    <div class="subtitle">GALLERY ADMIN</div>

    <div id="errorMessage" class="error-message"></div>

    <!-- Stage 1: Email + Password -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" id="loginBtn">Entrar</button>
      <div class="loading" id="loading">Autenticando...</div>
    </form>

    <!-- Stage 2: MFA -->
    <div id="mfaSection" class="mfa-section">
      <div class="form-group">
        <label for="mfaCode">Código MFA (Authenticator)</label>
        <input type="text" id="mfaCode" maxlength="6" placeholder="000000">
      </div>
      <button type="button" id="verifyMfaBtn">Verificar MFA</button>
    </div>

    <div class="forgot-password">
      <a href="#" id="forgotPasswordLink">Esqueceu a senha?</a>
    </div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="admin-login.js"></script>

</body>
</html>
