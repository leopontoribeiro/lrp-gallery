<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria · @eusouleandroribeiro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Barlow', sans-serif;
  --bg: #ffffff;
  background: var(--bg);
  color: #1a1a1a;
  overflow-x: hidden;
  transition: background 0.35s;
}

/* ── HEADER ── */
#site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid #efefef;
  transition: opacity 0.3s, background 0.35s, border-color 0.35s;
}

#site-header.hidden-on-cover {
  opacity: 0;
  pointer-events: none;
}

.logo-wrap { display: flex; flex-direction: column; line-height: 1.15; }

.logo-name {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.05rem; font-weight: 900;
  letter-spacing: 0.06em; color: #1a1a1a;
  text-transform: uppercase; transition: color 0.35s;
}

.logo-slogan {
  font-size: 0.52rem; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #aaa; font-family: 'Barlow', sans-serif; transition: color 0.35s;
}

.hamburger {
  background: none; border: none; cursor: pointer;
  padding: 6px; display: flex; flex-direction: column; gap: 5px;
}
.hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: #1a1a1a; border-radius: 2px; transition: background 0.35s;
}

/* ── DARK HEADER/BAR (fundos cinza e preto) ── */
body.bg-dark #site-header,
body.bg-dark #bottom-bar {
  background: rgba(12,12,12,0.97);
  border-color: rgba(255,255,255,0.07);
}
body.bg-dark .logo-name  { color: #e8e8e8; }
body.bg-dark .logo-slogan { color: #555; }
body.bg-dark .hamburger span { background: #d0d0d0; }
body.bg-dark .bar-count { color: #555; }
body.bg-dark .bar-heart-btn svg { stroke: #444; }
body.bg-dark .bar-heart-btn.has-likes svg { stroke: #e04444; fill: #e04444; }
body.bg-dark .bar-btn { background: #1e1e1e; }
body.bg-dark .bar-btn svg { stroke: #777; }
body.bg-dark .bar-btn:hover { background: #2a2a2a; }
body.bg-dark .bar-btn.active { background: #e8ff47; }
body.bg-dark .bar-btn.active svg { stroke: #111; }
body.bg-dark .ctrl-label { color: #3a3a3a; }
body.bg-dark .bar-sep { background: #202020; }
body.bg-dark .bar-btn-primary { background: #e8ff47; }
body.bg-dark .bar-btn-primary svg { stroke: #111; }
body.bg-dark .bar-btn-primary:hover { background: #d0e838; }

/* ── COVER ── */
#cover {
  position: relative; width: 100%; height: 100svh;
  overflow: hidden; cursor: pointer; background: #111;
}

#cover-img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  filter: brightness(0.62);
  transition: opacity 0.5s;
}
#cover-img[src=""] { opacity: 0; }

.cover-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 24px 72px; text-align: center;
}

.cover-title {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: clamp(1.9rem, 9vw, 6rem);
  font-weight: 900;
  color: #fff; letter-spacing: 0.05em; text-transform: uppercase;
  line-height: 1.05;
  word-break: break-word; overflow-wrap: break-word;
  max-width: 100%;
  text-shadow: 0 2px 24px rgba(0,0,0,0.4);
}

.cover-arrow {
  margin-top: 28px; display: flex;
  align-items: center; justify-content: center;
  animation: bounce 2s ease-in-out infinite;
}
.cover-arrow svg {
  width: 28px; height: 28px;
  stroke: rgba(255,255,255,0.8); fill: none; stroke-width: 1.5;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(7px); }
}

/* ── GRID SECTION ── */
#grid-section { padding-top: 56px; padding-bottom: 64px; }

/* ── MASONRY (flex colunas — ordem leitura esq→dir) ── */
.masonry {
  display: flex;
  align-items: flex-start;
  gap: 3px;
  padding: 3px;
  transition: gap 0.25s, padding 0.25s;
}
.masonry-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}

/* Moldura: mat ao redor de cada foto */
.masonry.size-frame { gap: 20px; padding: 20px; }
.masonry.size-frame .masonry-col { gap: 20px; }
.masonry.size-frame .photo-card {
  padding: 18px 18px 36px;
  background: var(--bg);
  box-shadow: 0 2px 20px rgba(0,0,0,0.12);
  overflow: visible;
}
body.bg-dark .masonry.size-frame .photo-card {
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.masonry.size-frame .photo-card img {
  border-radius: 0 !important;
}
.masonry.size-frame .photo-card:hover img { transform: none; }

/* Ignora gap classes quando moldura */
.masonry.size-frame.gap-sm,
.masonry.size-frame.gap-md,
.masonry.size-frame.gap-lg { gap: 20px; padding: 20px; }
.masonry.size-frame.gap-sm .masonry-col,
.masonry.size-frame.gap-md .masonry-col,
.masonry.size-frame.gap-lg .masonry-col { gap: 20px; }
.masonry.size-frame.gap-sm .photo-card,
.masonry.size-frame.gap-md .photo-card,
.masonry.size-frame.gap-lg .photo-card { border-radius: 0 !important; }

/* ── ESPAÇAMENTO ── */
.masonry.gap-sm { gap: 1px; padding: 1px; }
.masonry.gap-sm .masonry-col { gap: 1px; }

.masonry.gap-md { gap: 3px; padding: 3px; }
.masonry.gap-md .masonry-col { gap: 3px; }

.masonry.gap-lg { gap: 10px; padding: 10px; }
.masonry.gap-lg .masonry-col { gap: 10px; }
.masonry.gap-lg .photo-card { border-radius: 6px; }

/* ── PHOTO CARD ── */
.photo-card {
  position: relative; overflow: hidden;
  cursor: pointer; background: #e8e8e8; display: block;
  transition: border-radius 0.2s, background 0.35s, box-shadow 0.2s;
}
.photo-card img {
  width: 100%; display: block;
  opacity: 0;
  transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
.photo-card img.loaded { opacity: 1; }
.photo-card:hover img.loaded { transform: scale(1.03); }

/* Heart on card */
.card-heart {
  position: absolute; top: 8px; right: 8px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.88); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.8);
  transition: opacity 0.18s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 1px 5px rgba(0,0,0,0.15);
}
.photo-card:hover .card-heart, .photo-card.liked .card-heart {
  opacity: 1; transform: scale(1);
}
.card-heart svg { width: 15px; height: 15px; stroke: #bbb; fill: none; stroke-width: 1.8; transition: all 0.18s; }
.photo-card.liked .card-heart svg { stroke: #e04444; fill: #e04444; }

.card-heart.pop { animation: heartpop 0.32s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes heartpop {
  0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); }
}

/* ── BOTTOM BAR ── */
#bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: 56px; background: rgba(255,255,255,0.97);
  backdrop-filter: blur(6px); border-top: 1px solid #efefef;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; gap: 4px; transition: background 0.35s, border-color 0.35s;
}

.bar-left { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.bar-heart-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; padding: 6px; line-height: 0;
}
.bar-heart-btn svg { width: 22px; height: 22px; stroke: #ccc; fill: none; stroke-width: 1.6; transition: all 0.2s; }
.bar-heart-btn.has-likes svg { stroke: #e04444; fill: #e04444; }
.bar-count { font-size: 0.78rem; color: #999; font-weight: 400; min-width: 14px; transition: color 0.35s; }

.bar-center {
  display: flex; align-items: center; gap: 3px;
  flex: 1; justify-content: center;
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.bar-center::-webkit-scrollbar { display: none; }

.bar-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

.bar-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: #f5f5f5; border: none; cursor: pointer;
  transition: background 0.18s, transform 0.15s; line-height: 0; flex-shrink: 0;
}
.bar-btn:hover  { background: #ebebeb; }
.bar-btn:active { transform: scale(0.9); }
.bar-btn svg    { width: 14px; height: 14px; stroke: #555; fill: none; stroke-width: 1.6; transition: stroke 0.2s; }
.bar-btn.active { background: #1a1a1a; }
.bar-btn.active svg { stroke: #fff; }

.bar-btn-primary {
  width: 36px; height: 36px; border-radius: 50%;
  background: #1a1a1a; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s, transform 0.15s; line-height: 0; flex-shrink: 0;
}
.bar-btn-primary:hover  { background: #333; }
.bar-btn-primary:active { transform: scale(0.9); }
.bar-btn-primary svg    { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 1.6; }

.bar-sep { width: 1px; height: 16px; background: #e8e8e8; flex-shrink: 0; transition: background 0.35s; }

.ctrl-group { display: flex; align-items: center; gap: 2px; }
.ctrl-label {
  font-size: 0.5rem; color: #bbb; letter-spacing: 0.08em;
  text-transform: uppercase; margin-right: 1px;
  font-family: 'Barlow', sans-serif; white-space: nowrap; transition: color 0.35s;
}

/* ── COLOR SWATCHES ── */
.color-swatch {
  width: 20px !important; height: 20px !important;
  border-radius: 50% !important; border: 2px solid transparent !important;
  padding: 0 !important; flex-shrink: 0; cursor: pointer; outline: none;
  transition: transform 0.15s, border-color 0.15s !important;
}
.color-swatch:hover { transform: scale(1.2) !important; }
body:not(.bg-dark) .color-swatch.active { border-color: #1a1a1a !important; transform: scale(1.1) !important; }
body.bg-dark       .color-swatch.active { border-color: #e8ff47 !important; transform: scale(1.1) !important; }
#btnBgWhite { background: #ffffff; box-shadow: 0 0 0 1px #ddd inset; }
#btnBgGray  { background: #888888; }
#btnBgBlack { background: #111111; }
#btnBgAuto  { background: conic-gradient(#c9a96e 0%, #8b7aa8 40%, #6a9ab0 70%, #c9a96e 100%); }

/* ── LIGHTBOX ── */
#lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: #f5f5f5; display: flex; flex-direction: column;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
#lightbox.open { opacity: 1; pointer-events: all; }

.lb-topbar {
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px 0 10px; background: #fff; border-bottom: 1px solid #efefef; flex-shrink: 0;
}
.lb-back {
  background: none; border: none; cursor: pointer; padding: 8px; line-height: 0; color: #555;
  -webkit-tap-highlight-color: transparent;
}
.lb-back svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }
.lb-back:hover { color: #1a1a1a; }

.lb-topbar-right { display: flex; align-items: center; gap: 2px; }

.lb-heart {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 9px; line-height: 0;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color: transparent;
}
.lb-heart:active { transform: scale(0.85); }
.lb-heart svg { width: 22px; height: 22px; stroke: #bbb; fill: none; stroke-width: 1.6; transition: all 0.18s; }
.lb-heart.liked svg { stroke: #e04444; fill: #e04444; }

.lb-dl {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; padding: 9px; line-height: 0;
  -webkit-tap-highlight-color: transparent;
}
.lb-dl svg { width: 20px; height: 20px; stroke: #bbb; fill: none; stroke-width: 1.6; transition: stroke 0.15s; }
.lb-dl:hover svg { stroke: #333; }

.lb-menu { background: none; border: none; cursor: pointer; padding: 9px; display: flex; flex-direction: column; gap: 4px; -webkit-tap-highlight-color: transparent; }
.lb-menu span { display: block; width: 18px; height: 1.5px; background: #aaa; border-radius: 2px; }

/* Image area with side nav */
.lb-img-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; padding: 16px; position: relative;
}
.lb-img-area img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  display: block; user-select: none; -webkit-user-drag: none;
}

/* ── SIDE NAV ARROWS ── */
.lb-nav-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(255,255,255,0.92);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 14px rgba(0,0,0,0.13);
  transition: background 0.15s, opacity 0.18s;
  z-index: 10; opacity: 0.72;
  -webkit-tap-highlight-color: transparent;
}
.lb-nav-btn:hover  { background: #fff; opacity: 1; }
.lb-nav-btn:active { opacity: 0.5; }
.lb-nav-btn svg { width: 18px; height: 18px; stroke: #333; fill: none; stroke-width: 2; }
.lb-nav-prev { left: 14px; }
.lb-nav-next { right: 14px; }
@media (max-width: 600px) {
  .lb-nav-btn { width: 34px; height: 34px; }
  .lb-nav-prev { left: 6px; }
  .lb-nav-next { right: 6px; }
  .lb-nav-btn svg { width: 14px; height: 14px; }
}

/* ── PHOTO ANIMATIONS ── */
@keyframes lbSlideInRight { from { opacity:0; transform:translateX(36px) scale(0.97); } to { opacity:1; transform:none; } }
@keyframes lbSlideInLeft  { from { opacity:0; transform:translateX(-36px) scale(0.97); } to { opacity:1; transform:none; } }
@keyframes lbFadeIn       { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:none; } }
.lb-anim-right { animation: lbSlideInRight 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
.lb-anim-left  { animation: lbSlideInLeft  0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
.lb-anim-open  { animation: lbFadeIn       0.30s cubic-bezier(0.25,0.46,0.45,0.94) both; }

.lb-bottombar {
  background: #fff; border-top: 1px solid #efefef;
  padding: 10px 20px 14px; flex-shrink: 0;
}
.lb-filename { font-size: 0.68rem; color: #aaa; text-align: center; letter-spacing: 0.02em; }
.lb-counter  { font-size: 0.6rem; color: #ccc; text-align: center; margin-top: 4px; }

/* hidden cover btn — kept in DOM for JS */
.lb-cover-btn { display: none; }
.lb-cover-btn.is-cover { display: flex; }

/* ── DRAWER ── */
#drawer { position: fixed; inset: 0; z-index: 900; pointer-events: none; }
#drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.25s; }
#drawer-panel {
  position: absolute; top: 0; right: 0; width: 260px; height: 100%;
  background: #fff; transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.16,1,0.3,1);
  padding: 72px 28px 32px; display: flex; flex-direction: column; gap: 8px;
}
#drawer.open { pointer-events: all; }
#drawer.open #drawer-overlay { opacity: 1; }
#drawer.open #drawer-panel { transform: translateX(0); }

.drawer-item {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.2rem; font-weight: 800; color: #1a1a1a;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 12px 0; border-bottom: 1px solid #f0f0f0;
  cursor: pointer; background: none;
  border-left: none; border-right: none; border-top: none;
  text-align: left; width: 100%; transition: color 0.15s;
}
.drawer-item:hover { color: #888; }
.drawer-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; cursor: pointer; padding: 6px; line-height: 0;
}
.drawer-close svg { width: 20px; height: 20px; stroke: #888; fill: none; stroke-width: 1.6; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: #1a1a1a; color: #fff; font-size: 0.68rem;
  letter-spacing: 0.06em; padding: 9px 18px; border-radius: 20px;
  opacity: 0; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none; white-space: nowrap; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PASSWORD GATE ── */
#pw-gate, #expired-gate {
  position: fixed; inset: 0; z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(12px);
}
#pw-box, #expired-box {
  background: #fff; border-radius: 16px;
  padding: 40px 36px; max-width: 360px; width: 90%;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
#pw-icon, #expired-icon {
  width: 40px; height: 40px; margin: 0 auto 18px;
  stroke: #888; fill: none; stroke-width: 1.6;
}
#pw-gallery-name {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.5rem; font-weight: 900; letter-spacing: 0.06em;
  color: #111; margin-bottom: 6px; word-break: break-word;
}
#pw-sub, #expired-sub {
  font-size: 0.8rem; color: #888; margin-bottom: 24px; line-height: 1.5;
}
#pw-input {
  width: 100%; padding: 11px 14px; font-size: 0.9rem;
  border: 1.5px solid #ddd; border-radius: 8px;
  outline: none; margin-bottom: 12px; transition: border-color 0.2s;
  font-family: inherit;
}
#pw-input:focus { border-color: #333; }
#pw-input.shake { animation: inputShake 0.3s ease; }
@keyframes inputShake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  60%      { transform: translateX(6px); }
}
#pw-btn {
  width: 100%; padding: 12px; background: #111; color: #fff;
  border: none; border-radius: 8px; font-size: 0.85rem;
  font-weight: 600; cursor: pointer; letter-spacing: 0.04em;
  transition: background 0.2s;
}
#pw-btn:hover { background: #333; }
#pw-error { color: #e04444; font-size: 0.75rem; margin-top: 10px; min-height: 18px; }

/* ── EXPIRED GATE ── */
#expired-title {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 1.8rem; font-weight: 900; letter-spacing: 0.06em;
  color: #111; margin-bottom: 10px;
}
#expired-icon { stroke: #bbb; }
</style>
</head>
<body>

<!-- HEADER -->
<header id="site-header" class="hidden-on-cover">
  <div class="logo-wrap">
    <span class="logo-name">@eusouleandroribeiro</span>
    <span class="logo-slogan">Criatividade em Atividade</span>
  </div>
  <button class="hamburger" onclick="openDrawer()"><span></span><span></span></button>
</header>

<!-- COVER -->
<section id="cover" onclick="scrollToGrid()">
  <img id="cover-img" src="" alt="Cover" crossorigin="anonymous">
  <div class="cover-content">
    <h1 class="cover-title" id="coverTitle"></h1>
    <div class="cover-arrow">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
</section>

<!-- GRID -->
<div id="grid-section">
  <div class="masonry size-md gap-md" id="masonry"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">

  <!-- Esquerda: coração + contagem -->
  <div class="bar-left">
    <button class="bar-heart-btn" id="barHeartBtn" onclick="openLikedView()" title="Ver favoritas">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <span class="bar-count" id="barCount">0</span>
  </div>

  <!-- Centro: tamanho · espaçamento · fundo -->
  <div class="bar-center">

    <!-- Tamanho das fotos -->
    <div class="ctrl-group">
      <span class="ctrl-label">foto</span>

  } else {

    PHOTOS = [

init();

// ── SCROLL / OBSERVER ──
const cover  = document.getElementById('cover');

// ── RENDER ──
function getNumCols() {
  const w = window.innerWidth;
  switch (gridSize) {
    case 'sm':    return w >= 1100 ? 7 : w >= 700 ? 5 : 3;
    case 'md':    return w >= 1100 ? 4 : w >= 700 ? 3 : 2;
    case 'lg':    return w >= 1100 ? 3 : w >= 700 ? 2 : 1;
    case 'frame': return w >= 1000 ? 3 : w >= 600 ? 2 : 1;
    default:      return 2;
  }
}

function renderGrid(photos) {
  const grid = document.getElementById('masonry');
  grid.innerHTML = '';
  const n = getNumCols();

  // Cria N colunas flex
  const cols = Array.from({length: n}, () => {
    const col = document.createElement('div');
    col.className = 'masonry-col';
    grid.appendChild(col);
    return col;
  });

  // Distribui fotos da esquerda para direita (idx % n),
  // mantendo ordem cronológica na leitura visual
  photos.forEach((photo, idx) => {
    const card = document.createElement('div');
    card.className = 'photo-card' + (liked.has(photo.id) ? ' liked' : '');
    card.dataset.id = photo.id;
    card.innerHTML = `
      <img src="${photo.thumb}"
           loading="${idx < 8 ? 'eager' : 'lazy'}"
           decoding="async"
           alt="${photo.name}"
           onload="this.classList.add('loaded')"
           onclick="openLightbox(${idx}, event)">
      <button class="card-heart" onclick="toggleLike(event,${photo.id},this)" title="Favoritar">
        <svg viewBox="0 0 24 24" stroke-width="1.8">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    `;
    cols[idx % n].appendChild(card);
  });

  lbPhotos = photos;
}

// ── GRID SIZE ──
function setGridSize(size) {
  const grid = document.getElementById('masonry');
  grid.classList.remove('size-sm','size-md','size-lg','size-frame');
  grid.classList.add('size-' + size);
  gridSize = size;
  ['Sm','Md','Lg','Frame'].forEach(s =>
    document.getElementById('btnSize'+s).classList.toggle('active', size === s.toLowerCase())
  );
  renderGrid(lbPhotos); // re-renderiza com nova contagem de colunas
}

// Atualiza colunas ao redimensionar janela (ex: rotação mobile)
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => { if (lbPhotos.length) renderGrid(lbPhotos); }, 220);
});

// ── ESPAÇAMENTO ──
function setGap(gap) {
  const grid = document.getElementById('masonry');
  grid.classList.remove('gap-sm','gap-md','gap-lg');
  grid.classList.add('gap-' + gap);
  gridGap = gap;
  ['Sm','Md','Lg'].forEach(s =>
    document.getElementById('btnGap'+s).classList.toggle('active', gap === s.toLowerCase())
  );

// ── COR DE FUNDO ──
function setBg(mode) {
  const map = {
    white: '#ffffff',
    gray:  '#888888',
    black: '#111111',
    auto:  dominantColor || '#7a7a7a'
  };
  const color = map[mode] || '#ffffff';
  bgMode = mode;
  document.body.style.setProperty('--bg', color);
  document.body.classList.toggle('bg-dark',
    mode === 'gray' || mode === 'black' || (mode === 'auto' && isDark(dominantColor))
  );
  ['White','Gray','Black','Auto'].forEach(s =>
    document.getElementById('btnBg'+s).classList.toggle('active', mode === s.toLowerCase())
  );
}

function isDark(hex) {
  if (!hex) return false;
  const m = hex.match(/\d+/g);
  if (!m || m.length < 3) return false;
  const [r,g,b] = m.map(Number);
  return (r*0.299 + g*0.587 + b*0.114) < 140;
}

// ── COR DOMINANTE ──
function extractDominantColor() {
  if (PHOTOS.length === 0) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const canvas = document.createElement('canvas');
      canvas.width = 40; canvas.height = 40;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 40, 40);
      const d = ctx.getImageData(0, 0, 40, 40).data;
      let r=0, g=0, b=0, n = d.length / 4;
      for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
      r = Math.round(r/n); g = Math.round(g/n); b = Math.round(b/n);
      dominantColor = `rgb(${r},${g},${b})`;
      document.getElementById('btnBgAuto').style.background = dominantColor;
      // Atualiza fundo se já estava em modo auto
      if (bgMode === 'auto') setBg('auto');
    } catch(e) { /* CORS — mantém gradiente decorativo */ }
  };
  img.src = PHOTOS[0].thumb + (PHOTOS[0].thumb.includes('?') ? '&' : '?') + '_nc=' + Date.now();
}

// ── FOTO DE CAPA ──
async function setCoverPhoto() {

  // Atualiza visualmente

  // Persiste no Supabase

    const { error } = await sb
      .from('galleries')
      .update({ cover_photo_id: photo.id })
      .eq('id', galleryId);

    toast('Capa definida (demo)');
  }
}

// ── LIKE ──
function toggleLike(e, id, btn) {
  if (e) e.stopPropagation();
  const wasLiked = liked.has(id);
  wasLiked ? liked.delete(id) : liked.add(id);
  if (!wasLiked) trackEvent('like', id);

  if (!wasLiked && btn) {
    btn.classList.add('pop');
    btn.addEventListener('animationend', () => btn.classList.remove('pop'), {once:true});
  }

  const card = document.querySelector(`.photo-card[data-id="${id}"]`);
  if (card) card.classList.toggle('liked', !wasLiked);

  if (currentView === 'liked') {
    const favs = PHOTOS.filter(p => liked.has(p.id));
    if (favs.length === 0) showAll(); else renderGrid(favs);
  }
  updateBottomBar();
  updateLbHeart();
}

function toggleLikeLb() {
  const photo = lbPhotos[lbIndex];
  if (!photo) return;
  const btn = document.getElementById('lbHeart');
  const wasLiked = liked.has(photo.id);
  wasLiked ? liked.delete(photo.id) : liked.add(photo.id);
  if (!wasLiked) trackEvent('like', photo.id);
  btn.classList.toggle('liked', !wasLiked);
  const card = document.querySelector(`.photo-card[data-id="${photo.id}"]`);
  if (card) card.classList.toggle('liked', !wasLiked);
  updateBottomBar();
}

function updateLbHeart() {
  if (!lbPhotos[lbIndex]) return;

}

function updateBottomBar() {

// ── LIGHTBOX ──
function openLightbox(idx, e) {
  if (e) e.stopPropagation();
  lbIndex = idx;
  setLbPhoto(lbPhotos[idx], 0);
  document.getElementById('lbCounter').textContent = `${idx+1} / ${lbPhotos.length}`;
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKey);
  trackEvent('view', lbPhotos[idx].id);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}

function setLbPhoto(photo, dir) {
  const img = document.getElementById('lbImg');

  // Remove animações anteriores e oculta instantaneamente
  img.classList.remove('lb-anim-right', 'lb-anim-left', 'lb-anim-open');
  img.style.opacity = '0';

  setTimeout(() => {
    img.src = photo.full;
    img.style.opacity = '';        // devolve controle ao CSS/animation
    void img.offsetWidth;          // força reflow para reiniciar animation
    const cls = dir > 0 ? 'lb-anim-right' : dir < 0 ? 'lb-anim-left' : 'lb-anim-open';
    img.classList.add(cls);
    img.addEventListener('animationend', () => img.classList.remove(cls), { once: true });
  }, 80);

  document.getElementById('lbFilename').textContent = photo.name;
  document.getElementById('lbCoverBtn').classList.toggle('is-cover', photo.id === coverPhotoId);
  updateLbHeart();
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  setLbPhoto(lbPhotos[lbIndex], dir);
  document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbPhotos.length}`;
  trackEvent('view', lbPhotos[lbIndex].id);
}

function lbKey(e) {
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'Escape')     closeLightbox();
}

// Swipe mobile — ignora toques nas setas laterais
document.getElementById('lbImgArea').addEventListener('touchstart',

document.getElementById('lbImgArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 48) lbNav(dx < 0 ? 1 : -1);

function downloadFavorites() {
  const favs = PHOTOS.filter(p => liked.has(p.id));
  if (favs.length === 0) { toast('Nenhuma foto favoritada ainda'); return; }
  toast(`Salvando ${favs.length} favorita(s)...`);
  favs.forEach((p,i) => setTimeout(() => dl(p.full, p.name), i * 350));
}
function downloadAll() {
  toast(`Salvando ${PHOTOS.length} fotos...`);
  PHOTOS.forEach((p,i) => setTimeout(() => dl(p.full, p.name), i * 300));
}
function dl(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── AÇÃO PRINCIPAL ──
function handleBarAction() {
  liked.size > 0
    ? downloadFavorites()
    : toast('Favorite fotos com ♡ ou use o menu para salvar todas');
}

// ── DRAWER ──
function openDrawer()  { document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

// ── VISITOR ID ──
function getVisitorId() {
  const KEY = 'lrp_vid';
  let vid = localStorage.getItem(KEY);
  if (!vid) {
    vid = (crypto.randomUUID
      ? crypto.randomUUID()
      : 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2));
    localStorage.setItem(KEY, vid);
  }
  return vid;
}

// ── EVENT TRACKING ──
async function trackEvent(type, photoId) {
  if (!galleryId || !photoId) return;
  try {
    await sb.from('photo_events').insert({
      gallery_id: galleryId,
      photo_id:   photoId,
      event_type: type,
      visitor_id: getVisitorId()
    });
  } catch(e) { /* silencioso */ }
}

// ── PASSWORD GATE ──
function showPasswordGate(password, galleryName) {
  return new Promise(resolve => {
    _pendingPwResolve = resolve;
    const gate = document.getElementById('pw-gate');
    if (galleryName) document.getElementById('pw-gallery-name').textContent = galleryName.toUpperCase();
    gate.style.display = 'flex';
    document.getElementById('pw-input').focus();
    // store password for checkPw
    gate.dataset.pw = password;
  });
}

function checkPw() {
  const gate  = document.getElementById('pw-gate');
  const input = document.getElementById('pw-input');
  const err   = document.getElementById('pw-error');
  if (input.value === gate.dataset.pw) {
    gate.style.display = 'none';
    if (_pendingPwResolve) { _pendingPwResolve(true); _pendingPwResolve = null; }
  } else {
    err.textContent = 'Senha incorreta';
    input.value = '';
    input.classList.add('shake');
    input.addEventListener('animationend', () => input.classList.remove('shake'), {once:true});
  }
}

// ── EXPIRED OVERLAY ──
function showExpiredOverlay() {
  document.getElementById('expired-gate').style.display = 'flex';
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
